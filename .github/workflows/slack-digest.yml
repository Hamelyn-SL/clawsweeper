name: Slack Digest

on:
  schedule:
    # 08:30 Madrid (summer) on weekdays.
    - cron: "30 6 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: clawsweeper-slack-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Create state read token
        id: state-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: Hamelyn-SL
          repositories: clawsweeper-state
          permission-contents: read

      - uses: actions/checkout@v7
        with:
          repository: Hamelyn-SL/clawsweeper-state
          ref: state
          path: clawsweeper-state
          token: ${{ steps.state-token.outputs.token }}
          fetch-depth: 1

      - name: Post digest to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL }}
        run: node scripts/slack-digest.mjs --state-dir clawsweeper-state
